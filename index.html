<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Interface — Your Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg:           #0a0a0f;
    --bg2:          #111118;
    --bg3:          #1a1a24;
    --bg4:          #22222e;
    --border:       rgba(255,255,255,0.07);
    --text:         #f0f0f8;
    --text2:        #8888aa;
    --text3:        #55556a;
    --accent:       #4f8eff;
    --accent-glow:  rgba(79,142,255,0.18);
    --green:        #00d68f;
    --green-bg:     rgba(0,214,143,0.1);
    --red:          #ff4d6a;
    --red-bg:       rgba(255,77,106,0.1);
    --card-shadow:  0 4px 32px rgba(0,0,0,0.5);
    --shimmer:      rgba(255,255,255,0.03);
  }
  :root[data-theme="light"] {
    --bg:           #f0f2f8;
    --bg2:          #ffffff;
    --bg3:          #f7f8fc;
    --bg4:          #eceef5;
    --border:       rgba(0,0,0,0.08);
    --text:         #0d0d1a;
    --text2:        #6666888;
    --text3:        #aaaacc;
    --accent:       #2563eb;
    --accent-glow:  rgba(37,99,235,0.12);
    --green:        #059669;
    --green-bg:     rgba(5,150,105,0.08);
    --red:          #dc2626;
    --red-bg:       rgba(220,38,38,0.08);
    --card-shadow:  0 4px 24px rgba(0,0,0,0.1);
    --shimmer:      rgba(0,0,0,0.02);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ── Status bar ── */
  .statusbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 5px;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Header ── */
  .header {
    padding: 8px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-left h2 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .header-left h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-top: 2px;
  }
  .theme-toggle {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }
  .theme-toggle:hover { background: var(--bg4); }

  /* ── Balance hero ── */
  .balance-section {
    padding: 28px 20px 20px;
    text-align: center;
    position: relative;
  }
  .balance-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .balance-amount {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1;
    transition: all 0.4s;
    position: relative;
  }
  .balance-amount .currency {
    font-size: 22px;
    font-weight: 600;
    color: var(--text2);
    vertical-align: super;
    margin-right: 4px;
    font-family: 'DM Mono', monospace;
  }
  .balance-change {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    transition: all 0.3s;
  }
  .balance-change.positive { background: var(--green-bg); color: var(--green); }
  .balance-change.negative { background: var(--red-bg); color: var(--red); }
  .balance-change.neutral  { background: var(--bg4); color: var(--text2); }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 0 20px 20px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
    transition: all 0.2s;
  }
  .stat-card:active { transform: scale(0.97); }
  .stat-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 14px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
  }
  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }

  /* ── Section header ── */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 20px 12px;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .section-badge {
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    background: var(--bg4);
    padding: 3px 9px;
    border-radius: 20px;
  }

  /* ── Trade cards (Trust Wallet coin style) ── */
  .trades-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .trade-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .trade-card:active { transform: scale(0.98); background: var(--bg3); }

  .trade-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: -0.5px;
    flex-shrink: 0;
    position: relative;
  }
  .trade-icon.buy  { background: var(--green-bg); color: var(--green); border: 1.5px solid rgba(0,214,143,0.2); }
  .trade-icon.sell { background: var(--red-bg);   color: var(--red);   border: 1.5px solid rgba(255,77,106,0.2); }

  .trade-info { flex: 1; min-width: 0; }
  .trade-symbol {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .trade-type-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    border-radius: 6px;
  }
  .trade-type-badge.buy  { background: var(--green-bg); color: var(--green); }
  .trade-type-badge.sell { background: var(--red-bg);   color: var(--red); }

  .trade-meta {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .trade-right { text-align: right; flex-shrink: 0; }
  .trade-pnl {
    font-size: 15px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    transition: color 0.3s;
  }
  .trade-pnl.positive { color: var(--green); }
  .trade-pnl.negative { color: var(--red); }
  .trade-volume {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
  }

  /* ── Empty state ── */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text3);
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
  .empty-text { font-size: 13px; font-weight: 500; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 16px 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    white-space: nowrap;
    transition: all 0.2s;
    font-family: 'Syne', sans-serif;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  /* ── Tab panels ── */
  .tab-panel { display: none; padding-bottom: 100px; }
  .tab-panel.active { display: block; }

  /* ── Prices grid ── */
  .prices-grid {
    padding: 12px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .price-row {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .price-symbol {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    min-width: 80px;
  }
  .price-bid-ask {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    text-align: center;
    flex: 1;
  }
  .price-bid { color: var(--red); }
  .price-ask { color: var(--green); }
  .price-spread {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    text-align: right;
    min-width: 50px;
  }

  /* ── Pending orders ── */
  .pending-list {
    padding: 12px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .pending-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
  }
  .pending-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .pending-symbol { font-size: 15px; font-weight: 700; }
  .pending-type {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 6px;
    letter-spacing: 0.06em;
    background: var(--bg4);
    color: var(--text2);
  }
  .pending-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .pending-field { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
  .pending-val { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); }

  /* ── History ── */
  .history-list {
    padding: 12px 20px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .history-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .history-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .history-icon.buy  { background: var(--green-bg); color: var(--green); }
  .history-icon.sell { background: var(--red-bg);   color: var(--red); }
  .history-info { flex: 1; min-width: 0; }
  .history-symbol { font-size: 13px; font-weight: 700; }
  .history-time { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .history-profit {
    font-size: 14px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    text-align: right;
  }
  .history-profit.positive { color: var(--green); }
  .history-profit.negative { color: var(--red); }

  /* ── Account details ── */
  .account-panel { padding: 12px 20px 0; }
  .account-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 10px;
  }
  .account-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .account-field {}
  .account-field-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .account-field-value { font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 20px;
    backdrop-filter: blur(20px);
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px 0;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: color 0.2s;
    border: none;
    background: none;
    font-family: 'Syne', sans-serif;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }

  /* ── Update flash ── */
  @keyframes flash { 0%{opacity:1} 50%{opacity:0.3} 100%{opacity:1} }
  .flash { animation: flash 0.4s ease; }

  /* ── Loading skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── Margin level bar ── */
  .margin-bar-wrap { margin-top: 16px; }
  .margin-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .margin-bar-track { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .margin-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s, background 0.3s; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<!-- Status bar -->
<div class="statusbar">
  <span><span class="status-dot" id="statusDot"></span><span id="statusText">LIVE</span></span>
  <span id="lastUpdate" style="font-family:'DM Mono',monospace">--:--:--</span>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h2>Hello, Mike 👋</h2>
    <h1>Your Portfolio</h1>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
</div>

<!-- Balance hero -->
<div class="balance-section">
  <div class="balance-label">Total Balance</div>
  <div class="balance-amount" id="balanceAmount">
    <span class="currency">$</span><span id="balanceVal">——</span>
  </div>
  <div class="balance-change neutral" id="profitBadge">
    <span id="profitArrow">●</span>
    <span id="profitVal">Loading...</span>
  </div>
</div>

<!-- Stats row -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Equity</div>
    <div class="stat-value" id="equityVal">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Free Margin</div>
    <div class="stat-value" id="freeMarginVal">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Today</div>
    <div class="stat-value" id="dailyPnlVal">—</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('positions')">Positions</button>
  <button class="tab" onclick="switchTab('prices')">Prices</button>
  <button class="tab" onclick="switchTab('pending')">Pending</button>
  <button class="tab" onclick="switchTab('history')">History</button>
  <button class="tab" onclick="switchTab('account')">Account</button>
</div>

<!-- POSITIONS -->
<div class="tab-panel active" id="panel-positions">
  <div style="height:12px"></div>
  <div class="section-header">
    <span class="section-title">Open Trades</span>
    <span class="section-badge" id="openCount">0</span>
  </div>
  <div class="trades-list" id="tradesList">
    <div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-text">No open positions</div>
    </div>
  </div>
</div>

<!-- PRICES -->
<div class="tab-panel" id="panel-prices">
  <div style="height:12px"></div>
  <div class="section-header">
    <span class="section-title">Live Prices</span>
    <span class="section-badge" id="priceCount">0</span>
  </div>
  <div class="prices-grid" id="pricesList"></div>
</div>

<!-- PENDING -->
<div class="tab-panel" id="panel-pending">
  <div style="height:12px"></div>
  <div class="section-header">
    <span class="section-title">Pending Orders</span>
    <span class="section-badge" id="pendingCount">0</span>
  </div>
  <div class="pending-list" id="pendingList"></div>
</div>

<!-- HISTORY -->
<div class="tab-panel" id="panel-history">
  <div style="height:12px"></div>
  <div class="section-header">
    <span class="section-title">Trade History</span>
    <span class="section-badge" id="historyCount">0</span>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<!-- ACCOUNT -->
<div class="tab-panel" id="panel-account">
  <div style="height:12px"></div>
  <div class="account-panel" id="accountPanel"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('positions');setNav(this)">
    <span class="nav-icon">💼</span>Trades
  </button>
  <button class="nav-item" onclick="switchTab('prices');setNav(this)">
    <span class="nav-icon">📈</span>Prices
  </button>
  <button class="nav-item" onclick="switchTab('pending');setNav(this)">
    <span class="nav-icon">⏳</span>Pending
  </button>
  <button class="nav-item" onclick="switchTab('history');setNav(this)">
    <span class="nav-icon">🕐</span>History
  </button>
  <button class="nav-item" onclick="switchTab('account');setNav(this)">
    <span class="nav-icon">👤</span>Account
  </button>
</div>

<script>
// ── CONFIG ──────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTspvwPaKxt-7qPLkYQyAK1jSO0dGiavQqIlr2Af0aj-5oWrfMr2yrbxIBBV0Lsos/exec";
const REFRESH_MS = 3000;
// ────────────────────────────────────────────

let currentTab = 'positions';
let prevBalance = null;
let isOnline = false;

// ── Theme ────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.querySelector('.theme-toggle').textContent = saved === 'dark' ? '🌙' : '☀️';
})();

// ── Tabs ─────────────────────────────────────
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.toLowerCase().includes(name.substring(0,4))) t.classList.add('active');
  });
}
function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

// ── Formatters ───────────────────────────────
function fmt(n, decimals=2) {
  if (n === undefined || n === null || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  const abs = Math.abs(num).toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
  return (num < 0 ? '-' : '') + abs;
}
function fmtPrice(n) {
  if (!n) return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return num >= 100 ? num.toFixed(2) : num.toFixed(5);
}
function pnlClass(n) {
  const num = parseFloat(n);
  if (isNaN(num) || num === 0) return 'neutral';
  return num > 0 ? 'positive' : 'negative';
}
function pnlSign(n) {
  const num = parseFloat(n);
  if (isNaN(num) || num === 0) return '';
  return num > 0 ? '+' : '';
}
function symbolInitials(sym) {
  if (!sym) return '??';
  return sym.replace(/[^A-Z]/gi,'').substring(0,3).toUpperCase();
}

// ── Render balance ────────────────────────────
function renderBalance(data) {
  const acc    = data.account || {};
  const stats  = data.account || {};
  const bal    = parseFloat(acc.balance) || 0;
  const equity = parseFloat(acc.equity) || 0;
  const profit = parseFloat(acc.profit) || 0;
  const free   = parseFloat(acc.free_margin) || 0;
  const daily  = parseFloat(acc.daily_pnl !== undefined ? acc.daily_pnl : (data.account ? data.account.daily_pnl : 0)) || 0;

  // Balance
  const balEl = document.getElementById('balanceVal');
  const newBal = fmt(bal);
  if (balEl.textContent !== newBal) {
    balEl.textContent = newBal;
    balEl.classList.add('flash');
    setTimeout(() => balEl.classList.remove('flash'), 400);
  }

  // Profit badge
  const badge = document.getElementById('profitBadge');
  const profitEl = document.getElementById('profitVal');
  const arrowEl  = document.getElementById('profitArrow');
  badge.className = 'balance-change ' + pnlClass(profit);
  profitEl.textContent = pnlSign(profit) + '$' + fmt(profit);
  arrowEl.textContent  = profit > 0 ? '▲' : profit < 0 ? '▼' : '●';

  // Stats
  document.getElementById('equityVal').textContent = '$' + fmt(equity);
  document.getElementById('equityVal').className = 'stat-value';
  document.getElementById('freeMarginVal').textContent = '$' + fmt(free);

  const dailyPnlVal = data.account ? (data.account.daily_pnl !== undefined ? data.account.daily_pnl : 0) : 0;
  const dailyEl = document.getElementById('dailyPnlVal');
  dailyEl.textContent = pnlSign(dailyPnlVal) + '$' + fmt(dailyPnlVal);
  dailyEl.className = 'stat-value ' + pnlClass(dailyPnlVal);
}

// ── Render open trades ────────────────────────
function renderTrades(trades) {
  const list = document.getElementById('tradesList');
  const count = document.getElementById('openCount');
  const arr = trades || [];
  count.textContent = arr.length;

  if (arr.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No open positions</div></div>`;
    return;
  }

  list.innerHTML = arr.map(t => {
    const isBuy = (t.type || '').toUpperCase() === 'BUY';
    const cls   = isBuy ? 'buy' : 'sell';
    const pnl   = parseFloat(t.profit) || 0;
    return `
    <div class="trade-card">
      <div class="trade-icon ${cls}">${symbolInitials(t.symbol)}</div>
      <div class="trade-info">
        <div class="trade-symbol">
          ${t.symbol || '—'}
          <span class="trade-type-badge ${cls}">${t.type || ''}</span>
        </div>
        <div class="trade-meta">${fmtPrice(t.open_price)} → ${fmtPrice(t.current_price)} &nbsp;·&nbsp; ${t.volume || ''} lot</div>
      </div>
      <div class="trade-right">
        <div class="trade-pnl ${pnlClass(pnl)}">${pnlSign(pnl)}$${fmt(pnl)}</div>
        <div class="trade-volume">SL ${t.sl || '—'} / TP ${t.tp || '—'}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Render live prices ────────────────────────
function renderPrices(prices) {
  const list  = document.getElementById('pricesList');
  const count = document.getElementById('priceCount');
  const arr   = prices || [];
  count.textContent = arr.length;

  if (arr.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-text">No price data</div></div>`;
    return;
  }

  list.innerHTML = arr.map(p => `
    <div class="price-row">
      <div class="price-symbol">${p.symbol || '—'}</div>
      <div class="price-bid-ask">
        <span class="price-bid">${fmtPrice(p.bid)}</span>
        <span style="color:var(--text3);margin:0 4px">/</span>
        <span class="price-ask">${fmtPrice(p.ask)}</span>
      </div>
      <div class="price-spread">${p.spread_points || '—'} pts</div>
    </div>`).join('');
}

// ── Render pending orders ─────────────────────
function renderPending(orders) {
  const list  = document.getElementById('pendingList');
  const count = document.getElementById('pendingCount');
  const arr   = orders || [];
  count.textContent = arr.length;

  if (arr.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">No pending orders</div></div>`;
    return;
  }

  list.innerHTML = arr.map(o => `
    <div class="pending-card">
      <div class="pending-top">
        <span class="pending-symbol">${o.symbol || '—'}</span>
        <span class="pending-type">${o.type || '—'}</span>
      </div>
      <div class="pending-grid">
        <div><div class="pending-field">Entry</div><div class="pending-val">${fmtPrice(o.open_price)}</div></div>
        <div><div class="pending-field">SL</div><div class="pending-val">${o.sl || '—'}</div></div>
        <div><div class="pending-field">TP</div><div class="pending-val">${o.tp || '—'}</div></div>
        <div><div class="pending-field">Volume</div><div class="pending-val">${o.volume || '—'}</div></div>
        <div><div class="pending-field">Current</div><div class="pending-val">${fmtPrice(o.current_price)}</div></div>
        <div><div class="pending-field">Placed</div><div class="pending-val" style="font-size:10px">${(o.placed_time||'').split(' ')[1]||'—'}</div></div>
      </div>
    </div>`).join('');
}

// ── Render history ────────────────────────────
function renderHistory(history) {
  const list  = document.getElementById('historyList');
  const count = document.getElementById('historyCount');
  const arr   = history || [];
  count.textContent = arr.length;

  if (arr.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🕐</div><div class="empty-text">No trade history</div></div>`;
    return;
  }

  list.innerHTML = arr.map(h => {
    const isBuy = (h.type||'').toUpperCase() === 'BUY';
    const pnl   = parseFloat(h.profit) || 0;
    return `
    <div class="history-card">
      <div class="history-icon ${isBuy?'buy':'sell'}">${isBuy?'B':'S'}</div>
      <div class="history-info">
        <div class="history-symbol">${h.symbol || '—'} <span style="font-size:10px;color:var(--text3);font-weight:500">${h.type||''}</span></div>
        <div class="history-time">${h.time || '—'}</div>
      </div>
      <div class="history-profit ${pnlClass(pnl)}">${pnlSign(pnl)}$${fmt(pnl)}</div>
    </div>`;
  }).join('');
}

  const mlWidth = Math.min(ml / 10, 100);

  panel.innerHTML = `
    <div class="account-card">
      <div class="account-grid">
        <div class="account-field">

        </div>
        <div class="account-field">

        </div>
        <div class="account-field">
          <div class="account-field-label">Type</div>
          <div class="account-field-value" style="text-transform:uppercase;color:${acc.account_type==='live'?'var(--green)':'var(--accent)'}">${acc.account_type || '—'}</div>
        </div>

          <div class="account-field-label">Balance</div>
          <div class="account-field-value">$${fmt(acc.balance)}</div>
        </div>
        <div class="account-field">

          <div class="account-field-value">$${fmt(acc.equity)}</div>
        </div>
        <div class="account-field">
          <div class="account-field-label">Margin</div>
          <div class="account-field-value">$${fmt(acc.margin)}</div>
        </div>
        <div class="account-field">
          <div class="account-field-label">Free Margin</div>
          <div class="account-field-value">$${fmt(acc.free_margin)}</div>
        </div>
        <div class="account-field">
          <div class="account-field-label">Leverage</div>
          <div class="account-field-value">1:${acc.leverage || '—'}</div>
        </div>

      </div>
      <div class="margin-bar-wrap">

      <div class="account-grid">
        <div class="account-field">

          <div class="account-field-value" style="color:${parseFloat(acc.daily_pnl)>=0?'var(--green)':'var(--red)'}">${pnlSign(acc.daily_pnl)}$${fmt(acc.daily_pnl)}</div>
        </div>
        <div class="account-field">
          <div class="account-field-label">Today Trades</div>

        <div class="account-field">

        </div>
        <div class="account-field">
          <div class="account-field-label">Week Trades</div>
          <div class="account-field-value">${acc.weekly_trades || 0}</div>
        </div>
        <div class="account-field">
          <div class="account-field-label">Month P&L</div>
          <div class="account-field-value" style="color:${parseFloat(acc.monthly_pnl)>=0?'var(--green)':'var(--red)'}">${pnlSign(acc.monthly_pnl)}$${fmt(acc.monthly_pnl)}</div>
        </div>
        <div class="account-field">
          <div class="account-field-label">Month Trades</div>
          <div class="account-field-value">${acc.monthly_trades || 0}</div>

// ── Status ────────────────────────────────────
function setStatus(online) {
  isOnline = online;
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className  = 'status-dot' + (online ? '' : ' offline');
  text.textContent = online ? 'LIVE' : 'OFFLINE';
}

// ── Main fetch ────────────────────────────────
async function fetchData() {
  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now(), { cache: 'no-store' });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    setStatus(true);

    // Merge stats into account object for easy access
    const acc = Object.assign({}, data.account || {});
    // Stats come merged into account from the Apps Script readAccount()
    renderBalance({ account: acc });
    renderTrades(data.open_trades);
    renderPrices(data.live_prices);
    renderPending(data.pending_orders);
    renderHistory(data.trade_history);
    renderAccount(acc);

    // Last update time
    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      now.toTimeString().split(' ')[0];

  } catch(e) {
    setStatus(false);
    console.error('Fetch error:', e);
  }
}

// ── Boot ──────────────────────────────────────
fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
